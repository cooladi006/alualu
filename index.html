<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Alu-Alu Command</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Alu-Alu" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#FFFFFF" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  :root{--ink:#1D1D1F;--ink2:#6E6E73;--ink3:#A1A1A6;--hair:#E3E3E6;--hairS:#EDEDEF;--surface:#F5F5F7;--green:#0E7C57;--greenT:#E7F3EE;--red:#C5304A;--redT:#FBEDEF;--sel:#EAF4EF;--rm:#34343A;--conv:#C9C9CE}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:#fff;color:var(--ink);font-family:-apple-system,"SF Pro Display","SF Pro Text",system-ui,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .wrap{max-width:640px;margin:0 auto;padding:18px 20px 96px}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 0 20px}
  .brand{display:flex;align-items:center;gap:11px}
  .mono{width:30px;height:30px;border-radius:8px;background:var(--green);color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;letter-spacing:-.02em}
  .word{font-size:18px;font-weight:600;letter-spacing:-.02em}
  .topbar .meta{font-size:12px;color:var(--ink3)}
  h2{font-size:24px;font-weight:600;letter-spacing:-.02em;margin:0 0 20px}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);font-weight:600}
  .seg{display:flex;background:var(--surface);border-radius:11px;padding:3px}
  .seg button{flex:1;font:inherit;font-size:14px;font-weight:500;color:var(--ink2);background:transparent;border:none;border-radius:8px;padding:8px 0;cursor:pointer}
  .seg button.on{background:#fff;color:var(--ink);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.10)}
  .group{background:var(--surface);border-radius:16px;overflow:hidden}
  .cardhead{padding:0 4px 9px}
  .cardhead .t{font-size:14px;font-weight:600}
  .cardhead .n{font-size:12.5px;color:var(--ink3);margin-top:2px}
  .blk{margin-bottom:18px}
  .row{display:flex;justify-content:space-between;align-items:center;min-height:30px;padding:13px 16px;border-bottom:1px solid var(--hair)}
  .row:last-child{border-bottom:none}
  .row .lab{font-size:15.5px;color:var(--ink)}
  .nav{width:100%;display:flex;justify-content:space-between;align-items:center;padding:16px;background:transparent;border:none;border-bottom:1px solid var(--hair);cursor:pointer;font:inherit;text-align:left}
  .nav:last-child{border-bottom:none}
  .nav .l{font-size:16px;color:var(--ink)}
  .nav .r{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--ink3)}
  .nav .chev{font-size:19px;color:var(--ink3)}
  .pill{font:inherit;font-size:14px;font-weight:500;color:var(--ink2);background:#fff;border:1px solid var(--hair);border-radius:9px;padding:7px 12px;cursor:pointer}
  .pill.on{background:var(--green);border-color:var(--green);color:#fff;font-weight:600}
  .fld{background:#fff;border:1px solid var(--hair);border-radius:9px;padding:7px 11px;display:inline-flex;align-items:center;gap:3px;transition:border-color .15s,box-shadow .15s}
  .fld:focus-within{border-color:var(--green);box-shadow:0 0 0 3px rgba(14,124,87,.12)}
  .fld input{border:none;outline:none;background:transparent;text-align:right;font:inherit;font-size:15px;font-weight:500;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .fld .aff{font-size:13px;color:var(--ink3)}
  .back{display:flex;align-items:center;gap:4px;background:none;border:none;color:var(--green);font:inherit;font-size:15px;font-weight:500;cursor:pointer;padding:0 0 18px}
  .hint{font-size:13px;color:var(--ink3);line-height:1.55;padding:2px 4px 0}
  .heronum{font-size:60px;font-weight:600;line-height:.95}
  .spine{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
  .spine .l{display:flex;align-items:center;gap:10px;font-size:15px;color:var(--ink2)}
  .dot{width:8px;height:8px;border-radius:4px;display:inline-block}
  .bar{display:flex;height:7px;border-radius:4px;overflow:hidden;background:var(--hair);margin:14px 0 16px}
  .matrix{border:1px solid var(--hair);border-radius:16px;overflow:hidden;display:grid;grid-template-columns:1.35fr repeat(4,1fr)}
  .mh{border:none;cursor:pointer;font:inherit;font-size:14px;font-weight:600;padding:12px 4px;color:var(--ink);border-bottom:1px solid var(--hair)}
  .mlab{display:flex;align-items:center;padding:11px 14px;font-size:13px;color:var(--ink2);background:#fff;border-top:1px solid var(--hairS)}
  .mcell{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:11px 2px;border-top:1px solid var(--hairS)}
  .mcell .v{font-size:13.5px;font-weight:500}
  .mcell .s{font-size:9.5px;color:var(--ink3);margin-top:1px}
  .recap{background:var(--surface);border-radius:16px;padding:18px;margin:20px 0 8px;font-size:14.5px;line-height:1.6}
  .btn{font:inherit;font-size:15px;font-weight:600;color:#fff;background:var(--green);border:none;border-radius:980px;padding:12px 22px;cursor:pointer}
  .linkbtn{font:inherit;font-size:13.5px;font-weight:500;color:var(--ink2);background:none;border:none;cursor:pointer;padding:6px 4px}
  b{font-weight:600}
  @keyframes enter{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  .view.enter{animation:enter .30s cubic-bezier(.22,.61,.36,1) both}
  .seg button,.pill,.btn,.nav,.mh,.seldot,.addv,.delx,.linkbtn{transition:transform .12s ease,background .16s ease,color .16s ease,box-shadow .16s ease,border-color .16s ease}
  .pill:active,.btn:active,.mh:active,.seldot:active,.addv:active,.linkbtn:active{transform:scale(.96)}
  .nav:active{background:var(--hairS)}
  .vrow{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--hair);transition:background .2s ease}
  .vrow.sel{background:var(--sel)}
  .seldot{flex:0 0 auto;width:22px;height:22px;border-radius:50%;border:2px solid var(--hair);background:#fff;cursor:pointer;position:relative}
  .seldot.on{border-color:var(--green);background:var(--green)}
  .seldot.on:after{content:"";position:absolute;left:5px;top:5px;width:8px;height:8px;border-radius:50%;background:#fff}
  .vname{flex:1 1 auto;min-width:0;border:none;outline:none;background:transparent;font:inherit;font-size:14.5px;color:var(--ink)}
  .vrate{flex:0 0 auto;padding:6px 9px}
  .delx{flex:0 0 auto;width:24px;height:24px;border:none;background:none;color:var(--ink3);font-size:18px;cursor:pointer;line-height:1}
  .addv{width:100%;text-align:left;padding:12px 16px;background:none;border:none;border-top:1px solid var(--hair);color:var(--green);font:inherit;font-size:14px;font-weight:500;cursor:pointer}
  /* report on-screen */
  #pr .ttl{font-size:22px;font-weight:600;letter-spacing:-.02em}
  #pr .sub{font-size:12px;color:var(--ink3);margin-top:3px}
  #pr .head{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);font-weight:600;margin:22px 0 8px}
  .asum{display:grid;grid-template-columns:1fr 1fr;gap:0 18px}
  .arow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--hairS);font-size:12.5px}
  .arow .k{color:var(--ink2)}
  .arow .v{font-weight:600;font-variant-numeric:tabular-nums}
  .rmx{border:1px solid var(--hair);border-radius:12px;overflow:hidden;display:grid;grid-template-columns:1.5fr repeat(4,1fr);font-size:11.5px}
  .rmx .rh{font-weight:600;padding:9px 3px;text-align:right;border-bottom:1px solid var(--hair);background:#fff}
  .rmx .rh.first{text-align:left;padding-left:12px;color:var(--ink2);font-size:10px;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center}
  .rmx .rl{padding:7px 10px;color:var(--ink2);border-top:1px solid var(--hairS);background:#fff;display:flex;align-items:center}
  .rmx .rc{padding:7px 8px;text-align:right;border-top:1px solid var(--hairS);font-variant-numeric:tabular-nums;font-weight:500;display:flex;align-items:center;justify-content:flex-end}
  .rmx .strong{font-weight:700}
  @media print{body *{visibility:hidden!important}.noprint{display:none!important}}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";
var FIXED=[["Marketing",[150000,200000,250000,300000]],["Admin",[225000,250000,275000,300000]],["Lamination machine",[75000,100000,125000,150000]],["Production supervisor",[75000,75000,75000,75000]],["QA",[0,0,38000,75000]],["QC",[50000,50000,50000,50000]],["Adhesive mixing operator",[0,0,13000,25000]],["Slitting operator",[20000,30000,40000,50000]],["Helpers",[175000,200000,225000,250000]],["Electricity",[150000,200000,250000,300000]],["Rent",[200000,200000,200000,200000]],["Repair & maintenance",[38000,50000,63000,75000]],["Other expenses",[125000,150000,175000,200000]],["Contingency",[150000,150000,150000,150000]]];
var VARIABLE=[["Packaging materials",[100000,200000,300000,400000]],["Transportation",[100000,200000,300000,400000]],["Other expenses",[150000,300000,450000,600000]]];
var ASSETS0=[["AluAlu lamination machine",12500000],["Slitting machine",3000000],["Hot room / AHU HVAC",2500000],["QC lab",2000000],["Epoxy flooring",1000000],["Adhesive mixture",500000],["Cabins, electricals & furniture",5000000],["Doctoring machine",1000000],["Genset",1000000],["Roll stand & rack",1000000],["Miscellaneous",5000000]];
var DEFVOL=[25,50,75,100];
function mkCols(){return DEFVOL.map(function(v,i){return{vol:String(v),fixed:FIXED.map(function(f){return{name:f[0],amt:String(f[1][i])};}),variable:VARIABLE.map(function(f){return{name:f[0],amt:String(f[1][i])};})};});}

var S={
  substrates:[
    {name:"OPA",thickness:"25",density:"1.15",sel:0,vendors:[{name:"Vendor A",rate:"240"}]},
    {name:"Aluminium foil 8021",thickness:"50",density:"2.71",sel:0,vendors:[{name:"Vendor A",rate:"520"}]},
    {name:"PVC",thickness:"60",density:"1.35",sel:0,vendors:[{name:"Vendor A",rate:"170"}]}
  ],
  adh:{gsm:"6.74",wetMixPerTonne:"50",comps:[
    {name:"KUB130",parts:"100",sel:0,vendors:[{name:"Vendor A",rate:"351"}]},
    {name:"Hardener (Neo Force)",parts:"15",sel:0,vendors:[{name:"Vendor A",rate:"350"}]},
    {name:"Ethyl acetate",parts:"100",sel:0,vendors:[{name:"Vendor A",rate:"106"}]}
  ]},
  wastage:"6",price:"490",cols:mkCols(),focus:1,assets:ASSETS0.map(function(a){return{name:a[0],amt:String(a[1])};}),
  rmDays:"30",fgDays:"15",debDays:"75",credDays:"30",targetROI:"30",tax:"0",interest:"11",equityCap:"8",maxDE:"2",revision:"10",
  tab:"dashboard",screen:null,rep:"viability"
};

function nf(v){var x=parseFloat(v);return isFinite(x)?x:0;}
function dec(v,d){d=(d==null?2:d);return isFinite(v)?Number(v).toLocaleString("en-IN",{minimumFractionDigits:d,maximumFractionDigits:d}):"\u2014";}
function inr(v){return isFinite(v)?Math.round(v).toLocaleString("en-IN"):"\u2014";}
function pct(v,d){d=(d==null?0:d);return isFinite(v)?v.toFixed(d)+"%":"\u2014";}
function cr(v){return isFinite(v)?(v/1e7).toFixed(2):"\u2014";}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function ea(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;");}
function today(){return new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});}
function subRate(s){return nf(s.vendors[s.sel].rate);}
function sum(a){return a.reduce(function(x,y){return x+nf(y.amt);},0);}
function focusVol(){return nf(S.cols[S.focus].vol);}

function compute(){
  var subs=S.substrates.map(function(s){var rate=subRate(s);var gsm=nf(s.thickness)*nf(s.density);return{name:s.name,thickness:nf(s.thickness),density:nf(s.density),rate:rate,vendor:s.vendors[s.sel].name,gsm:gsm,costM2:gsm/1000*rate};});
  var totalGSM=subs.reduce(function(a,s){return a+s.gsm;},0)+nf(S.adh.gsm);
  var yieldKg=totalGSM/1000;
  var batchKg=S.adh.comps.reduce(function(a,c){return a+nf(c.parts);},0);
  var batchCost=S.adh.comps.reduce(function(a,c){return a+nf(c.parts)*subRate(c);},0);
  var avgRate=batchKg?batchCost/batchKg:0;
  var adhCostKg=nf(S.adh.wetMixPerTonne)*avgRate/1000;
  var adhCostM2=adhCostKg*yieldKg;
  var subsK=subs.map(function(s){return Object.assign({},s,{costKg:yieldKg?s.costM2/yieldKg:0});});
  var baseCostM2=subsK.reduce(function(a,s){return a+s.costM2;},0)+adhCostM2;
  var idealCostKg=yieldKg?baseCostM2/yieldKg:0;
  var finalRM=idealCostKg*(1+nf(S.wastage)/100);
  var fixedAssets=sum(S.assets);
  var price=nf(S.price),t=nf(S.tax)/100,g=nf(S.targetROI)/100,r=nf(S.interest)/100,Ecap=nf(S.equityCap)*1e7,maxDE=nf(S.maxDE);
  var base={subsK:subsK,adh:{avgRate:avgRate,adhCostKg:adhCostKg,adhCostM2:adhCostM2},yieldKg:yieldKg,baseCostM2:baseCostM2,idealCostKg:idealCostKg,finalRM:finalRM,wasteRs:finalRM-idealCostKg,fixedAssets:fixedAssets,rmMargin:price-finalRM};
  function ct(col){
    var vol=nf(col.vol),kgMo=vol*1000,kgYr=kgMo*12;
    var tf=sum(col.fixed),tv=sum(col.variable);
    var fixedKg=kgMo?tf/kgMo:0,varKg=kgMo?tv/kgMo:0,conv=fixedKg+varKg;
    var salesYr=kgYr*price,rmYr=kgYr*finalRM,fixedYr=tf*12,varYr=tv*12;
    var ebit=salesYr-rmYr-fixedYr-varYr;
    var patEq=ebit*(1-t),netKg=kgYr?patEq/kgYr:0;
    var totCostKg=finalRM+conv,aCOGS=kgYr*totCostKg;
    var rmInv=rmYr/365*nf(S.rmDays),fgInv=aCOGS/365*nf(S.fgDays),recv=salesYr/365*nf(S.debDays),pay=rmYr/365*nf(S.credDays);
    var wc=rmInv+fgInv+recv-pay,I=fixedAssets+wc;
    var roiCap=I?patEq/I*100:0,pass=roiCap>=nf(S.targetROI);
    var denom=g-(1-t)*r,Etar=null,Dtar=null,DEtar=null,leverOK=true;
    if(pass){Etar=I;Dtar=0;DEtar=0;}
    else if(denom<=0||ebit<=r*I){leverOK=false;}
    else{Etar=(1-t)*(ebit-r*I)/denom;if(Etar<0){leverOK=false;Etar=null;}else if(Etar>I){Etar=I;Dtar=0;DEtar=0;}else{Dtar=I-Etar;DEtar=Etar?Dtar/Etar:0;}}
    var equityUsed=Math.min(Ecap,I),debtCap=Math.max(0,I-Ecap),interestCap=debtCap*r,patCap=(ebit-interestCap)*(1-t),roeCap=equityUsed?patCap/equityUsed*100:0,deCap=equityUsed?debtCap/equityUsed:0,capWithin=deCap<=maxDE+1e-9;
    return{vol:vol,kgYr:kgYr,conv:conv,salesYr:salesYr,rmYr:rmYr,fixedYr:fixedYr,varYr:varYr,ebit:ebit,patEq:patEq,netKg:netKg,opKg:price-finalRM-conv,rmInv:rmInv,fgInv:fgInv,recv:recv,pay:pay,wc:wc,I:I,roiCap:roiCap,pass:pass,Etar:Etar,Dtar:Dtar,DEtar:DEtar,leverOK:leverOK,equityUsed:equityUsed,debtCap:debtCap,roeCap:roeCap,deCap:deCap,capWithin:capWithin};
  }
  var tiers=S.cols.map(ct),sel=tiers[S.focus];
  var passing=tiers.filter(function(t){return t.pass;});
  var threshold=passing.length?passing[0].vol:null;
  var self=tiers.filter(function(t){return t.I<=Ecap;});var maxSelf=self.length?self[self.length-1]:null;
  var lev=tiers.filter(function(t){return t.capWithin;});var maxLev=lev.length?lev[lev.length-1]:null;
  return{base:base,tiers:tiers,sel:sel,threshold:threshold,maxSelf:maxSelf,maxLev:maxLev,Ecap:Ecap,maxInvest:Ecap*(1+maxDE)};
}

function field(bind,val,o){o=o||{};var w=o.w||100;return '<span class="fld">'+(o.prefix?'<span class="aff">'+esc(o.prefix)+'</span>':'')+'<input type="text" inputmode="decimal" data-bind="'+ea(bind)+'" value="'+ea(val)+'" style="width:'+w+'px">'+(o.suffix?'<span class="aff">'+esc(o.suffix)+'</span>':'')+'</span>';}
function row(lab,inner){return '<div class="row"><span class="lab">'+esc(lab)+'</span>'+inner+'</div>';}
function card(head,note,inner){var h=head?'<div class="cardhead"><div class="t">'+esc(head)+'</div>'+(note?'<div class="n num">'+esc(note)+'</div>':'')+'</div>':'';return '<div class="blk">'+h+'<div class="group">'+inner+'</div></div>';}
function nav(label,val,scr){return '<button class="nav" data-action="screen" data-v="'+ea(scr)+'"><span class="l">'+esc(label)+'</span><span class="r"><span class="num">'+esc(val)+'</span><span class="chev">\u203A</span></span></button>';}
function seg(opts,cur,act){return '<div class="seg">'+opts.map(function(o){return '<button class="'+(cur===o[0]?"on":"")+'" data-action="'+act+'" data-v="'+ea(o[0])+'">'+esc(o[1])+'</button>';}).join("")+'</div>';}
function pills(){return '<div style="display:flex;gap:6px">'+S.cols.map(function(c,i){return '<button class="pill '+(S.focus===i?"on":"")+'" data-action="focus" data-i="'+i+'">'+nf(c.vol)+'T</button>';}).join("")+'</div>';}
function spine(color,label,v,strong){return '<div class="spine"><span class="l"><span class="dot" style="background:'+color+'"></span><span style="color:'+(strong?"var(--ink)":"var(--ink2)")+';font-weight:'+(strong?500:400)+'">'+esc(label)+'</span></span><span class="num" style="font-weight:'+(strong?600:400)+'">'+esc(v)+'</span></div>';}
function vendorBlock(matref,bindp,mat){
  var h="";
  mat.vendors.forEach(function(v,vi){
    h+='<div class="vrow'+(vi===mat.sel?' sel':'')+'">'+
      '<button class="seldot'+(vi===mat.sel?" on":"")+'" data-action="selv" data-mat="'+matref+'" data-i="'+vi+'"></button>'+
      '<input class="vname" type="text" data-bind="'+bindp+'.'+vi+'.name" value="'+ea(v.name)+'" placeholder="Vendor name">'+
      '<span class="fld vrate"><span class="aff">Rs</span><input type="text" inputmode="decimal" data-bind="'+bindp+'.'+vi+'.rate" value="'+ea(v.rate)+'" style="width:64px"></span>'+
      (mat.vendors.length>1?'<button class="delx" data-action="delv" data-mat="'+matref+'" data-i="'+vi+'">\u00D7</button>':'<span style="width:24px;flex:0 0 auto"></span>')+
      '</div>';
  });
  h+='<button class="addv" data-action="addv" data-mat="'+matref+'">+ Add vendor &amp; rate</button>';
  return h;
}

function viewDashboard(M){
  var s=M.sel,price=nf(S.price),fv=focusVol();
  var mc=s.pass?"var(--green)":"var(--red)";
  var rmW=Math.max(0,Math.min(100,M.base.finalRM/price*100));
  var convW=Math.max(0,Math.min(100-rmW,s.conv/price*100));
  var marW=Math.max(0,100-rmW-convW);
  var html="";
  html+='<div class="eyebrow">Return on capital \u00B7 '+fv+' T/mo</div>';
  html+='<div style="display:flex;align-items:baseline;gap:14px;margin:12px 0 6px"><span class="heronum num" style="color:'+mc+'">'+pct(s.roiCap)+'</span><span style="font-size:17px;color:var(--ink2)">vs '+nf(S.targetROI)+'% target</span></div>';
  html+='<div style="font-size:14.5px;color:var(--ink2);margin-bottom:30px">Investment <b>Rs '+cr(s.I)+' Cr</b> \u00B7 net profit <b>Rs '+cr(s.patEq)+' Cr</b>/yr \u00B7 margin <b>Rs '+dec(s.netKg)+'</b>/kg</div>';
  html+='<div class="eyebrow">Compare volumes \u2014 tap to focus</div>';
  html+='<div class="matrix" style="margin-top:12px">';
  html+='<div class="mh" style="background:#fff;color:var(--ink2);font-weight:600;font-size:11px;letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;padding-left:14px;justify-content:flex-start">Per year</div>';
  M.tiers.forEach(function(t,i){html+='<button class="mh" data-action="focus" data-i="'+i+'" style="background:'+(i===S.focus?"var(--sel)":"#fff")+'">'+t.vol+'T</button>';});
  function mrow(label,fn,opt){opt=opt||{};html+='<div class="mlab"'+(opt.last?' style="border-bottom:1px solid var(--hair)"':'')+'>'+esc(label)+'</div>';M.tiers.forEach(function(t,i){var c=fn(t);html+='<div class="mcell" style="background:'+(i===S.focus?"var(--sel)":"#fff")+';'+(opt.last?"border-bottom:1px solid var(--hair)":"")+'"><span class="v num" style="font-size:'+(opt.big?"16px":"13.5px")+';font-weight:'+(opt.big?700:500)+';color:'+(c.color||"var(--ink)")+'">'+c.t+'</span>'+(opt.sub?'<span class="s">'+opt.sub+'</span>':'')+'</div>';});}

function analysisCategories(M){
  var s=M.sel,fv=focusVol(),tgt=nf(S.targetROI),cap=nf(S.equityCap),cats=[];
  cats.push({t:"Target & threshold",b:(M.threshold?("On capital, the project clears "+tgt+"% from "+M.threshold+"T. At "+fv+"T it earns "+pct(s.roiCap)+" on Rs "+cr(s.I)+" Cr of total capital."):("No volume clears "+tgt+"% on capital alone at today\u2019s cost \u2014 cut cost per kg or lean on leverage."))});
  cats.push({t:"Funding with your Rs "+cap+" Cr",b:"Your equity is fixed at Rs "+cap+" Cr; the balance is debt. At "+fv+"T you put in Rs "+cr(s.equityUsed)+" Cr and borrow Rs "+cr(s.debtCap)+" Cr (D:E "+s.deCap.toFixed(2)+":1), giving "+pct(s.roeCap)+" on your own money \u2014 "+(s.roeCap>=tgt?"above":"below")+" your "+tgt+"% goal."});
  var firstROE=M.tiers.filter(function(t){return t.roeCap>=tgt;}),fr=firstROE.length?firstROE[0].vol:null;
  var b3=(fr?("On your Rs "+cap+" Cr you clear "+tgt+"% from "+fr+"T onward. "):("Even with debt, your Rs "+cap+" Cr doesn\u2019t clear "+tgt+"% on the listed volumes \u2014 cost must fall first. "));
  b3+="At "+nf(S.maxDE)+":1 your Rs "+cap+" Cr supports up to Rs "+cr(M.maxInvest)+" Cr of investment"+(M.maxLev?(", funding every column up to "+M.maxLev.vol+"T (ROE "+pct(M.maxLev.roeCap)+")."):", but the smallest column still needs more.");
  cats.push({t:"How far your Rs "+cap+" Cr reaches",b:b3});
  cats.push({t:"Levers to optimise ROI",b:"In order: (1) sell more tonnes \u2014 fixed cost dilutes; (2) squeeze the foil vendor, ~75% of RM; (3) cut the "+nf(S.debDays)+"-day debtor cycle; (4) stretch supplier credit past "+nf(S.credDays)+" days."});
  return cats;
}

function setByPath(p,v){
  var g=p.split(".");
  if(g.length===1){S[g[0]]=v;return;}
  if(g[0]==="subv"){S.substrates[+g[1]].vendors[+g[2]][g[3]]=v;return;}
  if(g[0]==="adhv"){S.adh.comps[+g[1]].vendors[+g[2]][g[3]]=v;return;}
  if(g[0]==="adh"){if(g[1]==="comp"){S.adh.comps[+g[2]][g[3]]=v;}else{S.adh[g[1]]=v;}return;}
  if(g[0]==="sub"){S.substrates[+g[1]][g[2]]=v;return;}
  if(g[0]==="col"){S.cols[+g[1]][g[2]]=v;return;}
  if(g[0]==="expf"){S.cols[S.focus].fixed[+g[1]].amt=v;return;}
  if(g[0]==="expv"){S.cols[S.focus].variable[+g[1]].amt=v;return;}
  if(g[0]==="asset"){S.assets[+g[1]].amt=v;return;}
}
function matObj(ref){var p=ref.split(":");return p[0]==="sub"?S.substrates[+p[1]]:S.adh.comps[+p[1]];}

  var INK="#1D1D1F",INK2="#6E6E73",INK3="#9A9AA0",GREEN="#0E7C57",RED="#C5304A",HAIR="#D6D6DA",HAIRS="#E8E8EC",BAND="#F2F2F4",SELC="#EDF6F1",WHITE="#FFFFFF",GREY="#8E8E93";

  function san(t){return String(t).replace(/[\u2012\u2013\u2014\u2015\u2212]/g,"-").replace(/\u00B7/g,"-").replace(/\u00D7/g,"x").replace(/\u2192/g,"->").replace(/\u00B5/g,"u").replace(/\u00B3/g,"3").replace(/\u2019/g,"'").replace(/\u20B9/g,"Rs ").replace(/[^\x20-\x7e]/g,"");}

  function rect(x,y,w,h,f){s+=hx(f)+" rg "+x.toFixed(2)+" "+(H-y-h).toFixed(2)+" "+w.toFixed(2)+" "+h.toFixed(2)+" re f\n";}

  var mx0=40,mw=515, edges=[190,281,372,463,554], colR=[277,368,459,550], valR=[colR[0]-22,colR[1]-22,colR[2]-22,colR[3]-22], mtop=ty+10, fi=S.focus;

  rows.push({sec:"INVESTMENT   (Rs Cr)"});

  rows.push({sec:"FUNDING WITH YOUR RS "+nf(S.equityCap)+" CR EQUITY  (balance = debt)"});

  rows.push({l:"Your equity (own funds)",c:T.map(function(t){return cr(t.equityUsed);})});
  rows.push({l:"Debt to arrange",c:T.map(function(t){return cr(t.debtCap);})});
  rows.push({l:"Debt : Equity",c:T.map(function(t){return t.deCap.toFixed(2)+":1";})});
  rows.push({l:"Return on YOUR equity",c:T.map(function(t){return pct(t.roeCap);}),b:true,col:function(i){return T[i].roeCap>=tgt?GREEN:RED;}});
  var rowH=15.0, hdrH=17, totalH=hdrH+rows.length*rowH;
  rect(edges[fi],mtop,edges[fi+1]-edges[fi],totalH,SELC);
  T.forEach(function(t,i){rt(valR[i],mtop+12,nf(S.cols[i].vol)+"T",9.5,true,i===fi?GREEN:INK);});
  line(mx0,mtop+hdrH,mx0+mw,mtop+hdrH,HAIR,0.9);
  var yy=mtop+hdrH;

    if(rw.sec){rect(mx0,yy,mw,rowH,BAND);txt(mx0+8,yy+10.5,rw.sec,8,true,INK2);yy+=rowH;return;}
    txt(mx0+8,yy+10.5,rw.l,9,!!rw.b,rw.b?INK:INK2);
    rw.c.forEach(function(cell,i){rt(valR[i],yy+10.5,cell,9,!!rw.b,rw.col?rw.col(i):INK);if(rw.p&&rw.p[i]){rt(colR[i],yy+10.5,rw.p[i],8,false,INK3);}});

  var pdf="%PDF-1.4\n%\u00e2\u00e3\u00cf\u00d3\n",off=[];

  pdf+="trailer\n<< /Size 7 /Root 1 0 R >>\nstartxref\n"+xp+"\n%%EOF";
  var bytes=new Uint8Array(pdf.length);for(var k=0;k<pdf.length;k++){bytes[k]=pdf.charCodeAt(k)&0xff;}

function sharePDF(){
  var blob=buildPDF(compute());
  var file=null;try{file=new File([blob],"AluAlu-Viability.pdf",{type:"application/pdf"});}catch(e){}
  if(file&&navigator.canShare&&navigator.canShare({files:[file]})){navigator.share({files:[file],title:"Alu-Alu Viability"}).catch(function(){});}
  else{var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="AluAlu-Viability.pdf";document.body.appendChild(a);a.click();a.remove();}
}

document.addEventListener("input",function(e){
  var el=e.target;if(!el.dataset||!el.dataset.bind)return;
  var id=el.dataset.bind,caret=null;try{caret=el.selectionStart;}catch(_){}
  var sy=(window.scrollY||0);
  setByPath(id,el.value);render();
  window.scrollTo(0,sy);
  var again=document.querySelector('[data-bind="'+id.replace(/"/g,'\\"')+'"]');
  if(again){again.focus();if(caret!=null){try{again.setSelectionRange(caret,caret);}catch(_){}}}
});
document.addEventListener("click",function(e){
  var el=e.target.closest("[data-action]");if(!el)return;
  var a=el.dataset.action,v=el.dataset.v,sy=(window.scrollY||0);
  if(a==="tab"){S.tab=v;S.screen=null;render();window.scrollTo(0,0);}

  else if(a==="focus"){S.focus=parseInt(el.dataset.i,10);render();window.scrollTo(0,sy);}

});
